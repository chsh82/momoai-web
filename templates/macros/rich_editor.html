{% macro rich_editor(editor_id='editor', name='content', value='', upload_url='', required=True, min_height='350px') %}
<div class="border border-gray-300 rounded-lg overflow-hidden focus-within:ring-2 focus-within:ring-blue-500">
    <!-- 툴바 -->
    <div class="bg-gray-50 border-b border-gray-300 px-4 py-2 flex flex-wrap gap-1 items-center">
        <button type="button"
                onclick="document.execCommand('bold'); document.getElementById('{{ editor_id }}').focus();"
                class="px-2 py-1 hover:bg-gray-200 rounded transition text-sm font-bold" title="굵게">B</button>
        <button type="button"
                onclick="document.execCommand('italic'); document.getElementById('{{ editor_id }}').focus();"
                class="px-2 py-1 hover:bg-gray-200 rounded transition text-sm italic" title="기울임">I</button>
        <button type="button"
                onclick="document.execCommand('underline'); document.getElementById('{{ editor_id }}').focus();"
                class="px-2 py-1 hover:bg-gray-200 rounded transition text-sm underline" title="밑줄">U</button>
        <div class="w-px h-5 bg-gray-300 mx-1"></div>
        <button type="button"
                onclick="document.execCommand('insertUnorderedList'); document.getElementById('{{ editor_id }}').focus();"
                class="px-2 py-1 hover:bg-gray-200 rounded transition text-sm" title="글머리 기호">• 목록</button>
        <button type="button"
                onclick="document.execCommand('insertOrderedList'); document.getElementById('{{ editor_id }}').focus();"
                class="px-2 py-1 hover:bg-gray-200 rounded transition text-sm" title="번호 목록">1. 목록</button>
        <div class="w-px h-5 bg-gray-300 mx-1"></div>
        <button type="button"
                onclick="document.getElementById('imgInput_{{ editor_id }}').click();"
                class="px-2 py-1 hover:bg-gray-200 rounded transition text-sm" title="이미지 삽입">🖼️ 이미지</button>
        <span class="text-xs text-gray-400 ml-auto hidden sm:inline">Ctrl+V로 이미지 붙여넣기 가능</span>
    </div>
    <!-- 에디터 본문 -->
    <div id="{{ editor_id }}"
         contenteditable="true"
         style="min-height: {{ min_height }}; padding: 12px 16px;"
         class="focus:outline-none"
         data-placeholder="내용을 입력하세요. 이미지는 Ctrl+V로 붙여넣거나 드래그앤드롭할 수 있습니다.">{{ value | safe }}</div>
    <!-- 히든 필드 (폼 제출용) -->
    <input type="hidden" name="{{ name }}" id="hiddenField_{{ editor_id }}">
</div>
<!-- 이미지 파일 선택 인풋 (숨김) -->
<input type="file" id="imgInput_{{ editor_id }}" accept="image/*" style="display:none">
<p class="text-xs text-gray-500 mt-2">💡 이미지를 복사(Ctrl+C)한 후 붙여넣기(Ctrl+V)하거나, 이미지 파일을 에디터에 드래그해서 놓을 수 있습니다.</p>

<style>
#{{ editor_id }}:empty:before {
    content: attr(data-placeholder);
    color: #9ca3af;
    pointer-events: none;
    display: block;
}
#{{ editor_id }} img {
    max-width: 100%;
    height: auto;
    margin: 8px 0;
    border-radius: 6px;
    display: block;
}
#{{ editor_id }}:focus { outline: none; }
</style>

<script>
(function() {
    var editorEl = document.getElementById('{{ editor_id }}');
    var hiddenEl = document.getElementById('hiddenField_{{ editor_id }}');
    var imgInputEl = document.getElementById('imgInput_{{ editor_id }}');
    var uploadUrl = '{{ upload_url }}';
    var isRequired = {{ 'true' if required else 'false' }};

    // 폼 제출 시 에디터 HTML → hidden field 복사
    var formEl = editorEl.closest('form');
    if (formEl) {
        formEl.addEventListener('submit', function(e) {
            var html = editorEl.innerHTML.trim();
            if (isRequired && (!html || html === '<br>')) {
                alert('내용을 입력해주세요.');
                e.preventDefault();
                return;
            }
            hiddenEl.value = html;
        });
    }

    // 이미지 파일 선택 핸들러
    imgInputEl.addEventListener('change', function() {
        if (this.files && this.files[0]) {
            uploadImageFile(this.files[0]);
            this.value = '';
        }
    });

    // Ctrl+V 클립보드 붙여넣기
    editorEl.addEventListener('paste', function(e) {
        var items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (var i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') !== -1) {
                e.preventDefault();
                uploadImageFile(items[i].getAsFile());
                return;
            }
        }
    });

    // 드래그앤드롭
    editorEl.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.stopPropagation();
        this.style.backgroundColor = '#eff6ff';
    });
    editorEl.addEventListener('dragleave', function(e) {
        e.preventDefault();
        this.style.backgroundColor = '';
    });
    editorEl.addEventListener('drop', function(e) {
        e.preventDefault();
        e.stopPropagation();
        this.style.backgroundColor = '';
        var files = e.dataTransfer.files;
        for (var i = 0; i < files.length; i++) {
            if (files[i].type.indexOf('image') !== -1) {
                uploadImageFile(files[i]);
            }
        }
    });

    function uploadImageFile(file) {
        var formData = new FormData();
        formData.append('image', file, file.name || 'paste.png');

        editorEl.focus();
        var loadingId = 'loading_' + Date.now();
        document.execCommand('insertHTML', false,
            '<span id="' + loadingId + '" style="color:#2563eb;font-style:italic;">🔄 이미지 업로드 중...</span>');

        fetch(uploadUrl, {
            method: 'POST',
            body: formData
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var loadingEl = document.getElementById(loadingId);
            if (loadingEl) loadingEl.remove();
            if (data.success) {
                document.execCommand('insertHTML', false,
                    '<img src="' + data.url + '" alt="image" style="max-width:100%;height:auto;margin:8px 0;border-radius:6px;display:block;">');
            } else {
                alert('이미지 업로드 실패: ' + (data.message || '알 수 없는 오류'));
            }
        })
        .catch(function() {
            var loadingEl = document.getElementById(loadingId);
            if (loadingEl) loadingEl.remove();
            alert('이미지 업로드 중 오류가 발생했습니다.');
        });
    }
})();
</script>
{% endmacro %}
