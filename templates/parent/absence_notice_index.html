{% extends "base.html" %}
{% block title %}결석 예고 - MOMOAI v4.0{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <h2 class="text-2xl font-bold text-gray-800 mb-6">🚫 결석 예고</h2>

  {% if children %}
  <div class="bg-white rounded-xl shadow divide-y divide-gray-100">
    {% for child in children %}
    <a href="{{ url_for('parent.absence_notice', student_id=child.student_id) }}"
       class="flex items-center justify-between px-5 py-4 hover:bg-gray-50 transition">
      <div>
        <p class="font-semibold text-gray-800">{{ child.name }}</p>
        <p class="text-sm text-gray-500">{{ child.grade }}학년</p>
      </div>
      <span class="text-gray-400">→</span>
    </a>
    {% endfor %}
  </div>
  {% else %}
  <div class="bg-white rounded-xl shadow p-8 text-center text-gray-400">
    등록된 자녀가 없습니다.
  </div>
  {% endif %}
</div>
{% endblock %}
