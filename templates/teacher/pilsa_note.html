{% extends "base.html" %}
{% block title %}필사 노트 - MOMOAI v4.0{% endblock %}

{% block content %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400&display=swap');

  .wongo-wrap {
    font-family: 'Noto Serif KR', 'Batang', '바탕', serif;
  }
  .wongo-page {
    display: grid;
    grid-template-columns: repeat(20, 1fr);
    border-top: 2px solid #888;
    border-left: 2px solid #888;
  }
  .wongo-cell {
    position: relative;
    aspect-ratio: 1;
    border-right: 1px solid #bbb;
    border-bottom: 1px solid #bbb;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: rgb(185, 185, 188);
    line-height: 1;
    user-select: none;
  }
  /* 5칸/끝칸 경계선은 JS 인라인 스타일로 처리 */
  .wongo-cell::before {
    content: '';
    position: absolute;
    width: 2px; height: 2px;
    background: #e0e0e0;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .wongo-cell.filled::before { display: none; }

  @media print {
    .no-print { display: none !important; }
    .max-w-7xl { max-width: none !important; margin: 0 !important; }
    #print-area {
      padding: 10mm 12mm;
      box-sizing: border-box;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .print-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 14pt;
      text-align: center;
      margin-bottom: 6mm;
      color: #333;
    }
    .wongo-page {
      border-top: 1.5pt solid #999;
      border-left: 1.5pt solid #999;
    }
    .wongo-cell {
      border-right: 0.5pt solid #ddd;
      border-bottom: 0.5pt solid #ddd;
      color: rgb(235, 235, 235) !important;
    }
    /* 5칸/끝칸 경계선은 JS 인라인 스타일로 처리 */
  }
</style>

<div class="max-w-7xl mx-auto">
  <div class="mb-6 flex items-center justify-between no-print">
    <div>
      <h2 class="text-3xl font-bold text-gray-800">📝 필사 노트</h2>
      <p class="text-gray-500 mt-1 text-sm">글을 입력하면 원고지 위에 연한 명조 글씨로 표시됩니다. 학생이 위에 따라 쓰는 필사 연습지를 만들어 보세요.</p>
    </div>
    <button onclick="printPilsa()"
            class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-lg transition">
      🖨️ 인쇄 / PDF 저장
    </button>
  </div>

  <div class="bg-white rounded-lg shadow p-5 mb-6 no-print">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">제목 (선택)</label>
        <input type="text" id="titleInput" placeholder="예: 5월 4주차 필사 노트"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
               oninput="renderWongo()">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">글자 크기</label>
        <select id="fontSizeSelect"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                onchange="onFontSizeChange()">
          <option value="18" data-cols="20">보통</option>
          <option value="23" data-cols="17">크게</option>
          <option value="28" data-cols="14">더 크게</option>
          <option value="34" data-cols="11">매우 크게</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          칸 수 <span class="text-gray-400 font-normal text-xs ml-1">(열 개수)</span>
        </label>
        <input type="number" id="colsInput" value="20" min="8" max="30"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
               oninput="renderWongo()">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          행 추가 <span id="autoRowsInfo" class="text-gray-400 font-normal text-xs ml-1"></span>
        </label>
        <div class="flex items-center gap-1">
          <button type="button" onclick="adjustRows(-1)"
                  class="px-3 py-2 border border-gray-300 rounded-lg text-sm hover:bg-gray-100 transition font-bold">−</button>
          <input type="number" id="extraRowsInput" value="0" min="-20" max="50"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-center"
                 oninput="renderWongo()">
          <button type="button" onclick="adjustRows(1)"
                  class="px-3 py-2 border border-gray-300 rounded-lg text-sm hover:bg-gray-100 transition font-bold">＋</button>
        </div>
      </div>
    </div>
    <div class="mt-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">
        내용 입력 <span id="charCount" class="text-gray-400 font-normal ml-2">0자</span>
      </label>
      <textarea id="textInput" rows="6"
                placeholder="원고지에 표시할 글을 입력하세요. 줄바꿈(엔터)은 새 행으로 처리됩니다."
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-y"
                oninput="renderWongo()"></textarea>
    </div>
  </div>

  <div id="print-area" class="wongo-wrap">
    <div id="print-title-area"></div>
    <div id="wongo-output"></div>
  </div>

  <p class="text-xs text-gray-400 text-center mt-4 no-print">
    인쇄 시 브라우저 인쇄 설정에서 "여백: 최소" / "배경 그래픽: 켜기"로 설정하면 더 깔끔하게 출력됩니다.
  </p>
</div>

<script>
const CHAR_COLOR = 'rgb(185, 185, 188)';

// 글자 크기별 기본 칸 수 (A4 186mm 기준)
const FONT_PRESETS = {
  '18': 20,
  '23': 17,
  '28': 14,
  '34': 11,
};

// A4 인쇄 영역 기준 자동 행수 계산
// 셀이 정사각형이고 칸 수 = cols 이면, 셀 크기 = 186mm/cols
// 세로 가용 높이 277mm → 행수 = floor(277 / (186/cols)) = floor(277*cols/186)
function calcAutoRows(cols) {
  return Math.floor(277 * cols / 186);
}

function onFontSizeChange() {
  const fontPx = document.getElementById('fontSizeSelect').value;
  const defaultCols = FONT_PRESETS[fontPx] || 20;
  document.getElementById('colsInput').value = defaultCols;
  document.getElementById('extraRowsInput').value = 0;
  renderWongo();
}

function adjustRows(delta) {
  const input = document.getElementById('extraRowsInput');
  input.value = parseInt(input.value || 0) + delta;
  renderWongo();
}

function renderWongo() {
  const raw       = document.getElementById('textInput').value;
  const title     = document.getElementById('titleInput').value.trim();
  const fontSize  = document.getElementById('fontSizeSelect').value + 'px';
  const COLS      = Math.max(1, parseInt(document.getElementById('colsInput').value) || 20);
  const extraRows = parseInt(document.getElementById('extraRowsInput').value) || 0;

  const autoRows  = calcAutoRows(COLS);
  const totalRows = Math.max(1, autoRows + extraRows);

  // 자동 행수 표시
  document.getElementById('autoRowsInfo').textContent =
    `(자동 ${autoRows}행)`;

  // 줄바꿈 보존하여 셀 배열로 변환
  let cells = [];
  const lines = raw.split('\n');
  for (let li = 0; li < lines.length; li++) {
    const currentCol = cells.length % COLS;
    if (currentCol !== 0 && li > 0) {
      for (let pad = currentCol; pad < COLS; pad++) cells.push('');
    }
    for (const ch of [...lines[li]]) {
      cells.push(ch === ' ' ? '\u00A0' : ch);
    }
  }

  document.getElementById('charCount').textContent =
    [...raw.replace(/\n/g, '')].length + '자';

  // 제목
  document.getElementById('print-title-area').innerHTML =
    title ? `<div class="print-title">${escHtml(title)}</div>` : '';

  // 입력 글자 수 vs 설정 행수 중 큰 쪽
  const neededRows = Math.max(totalRows, Math.ceil(cells.length / COLS));
  const neededCells = neededRows * COLS;
  while (cells.length < neededCells) cells.push('');

  // CSS 변수로 칸 수 전달
  const grid = document.getElementById('wongo-output');

  let html = `<div class="wongo-page" style="grid-template-columns: repeat(${COLS}, 1fr);">`;
  for (let i = 0; i < cells.length; i++) {
    const ch = cells[i];
    const filled = ch && ch.trim();
    // 5칸마다 경계선 강조 (칸 수에 맞게)
    const is5th = (i + 1) % 5 === 0 && (i + 1) % COLS !== 0;
    const isLast = (i + 1) % COLS === 0;
    let borderStyle = '';
    if (isLast) borderStyle = 'border-right: 2px solid #888;';
    else if (is5th) borderStyle = 'border-right: 1px solid #999;';
    const style = `font-size:${fontSize};${borderStyle}` +
      (filled ? `;color:${CHAR_COLOR}` : '');
    html += `<div class="wongo-cell${filled ? ' filled' : ''}" style="${style}">${filled ? escHtml(ch) : ''}</div>`;
  }
  html += '</div>';

  grid.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function printPilsa() {
  const printArea = document.getElementById('print-area').innerHTML;
  const win = window.open('', '_blank', 'width=900,height=700');
  win.document.write(`<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>필사 노트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Serif KR', 'Batang', serif; background: #fff; }
    .wongo-wrap { font-family: 'Noto Serif KR', 'Batang', serif; }
    .wongo-page {
      display: grid;
      border-top: 2px solid #888;
      border-left: 2px solid #888;
    }
    .wongo-cell {
      position: relative;
      aspect-ratio: 1;
      border-right: 1px solid #bbb;
      border-bottom: 1px solid #bbb;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      line-height: 1;
    }
    .wongo-cell::before {
      content: '';
      position: absolute;
      width: 2px; height: 2px;
      background: #e0e0e0;
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .wongo-cell.filled::before { display: none; }
    .print-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 14pt;
      text-align: center;
      margin-bottom: 6mm;
      color: #333;
    }
    @media print {
      body { padding: 10mm 12mm; }
      .wongo-page {
        border-top: 1.5pt solid #999;
        border-left: 1.5pt solid #999;
      }
      .wongo-cell {
        border-right: 0.5pt solid #ddd;
        border-bottom: 0.5pt solid #ddd;
      }
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  </style>
</head>
<body class="wongo-wrap">
  ${printArea}
  <script>
    // 폰트 로드 후 인쇄 (iOS 포함)
    document.fonts.ready.then(function() {
      setTimeout(function() { window.print(); }, 300);
    });
  <\/script>
</body>
</html>`);
  win.document.close();
}

renderWongo();
</script>
{% endblock %}
