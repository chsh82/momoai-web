{% extends "base.html" %}

{% block title %}새 메시지 - MOMOAI{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="mb-6 flex items-center gap-3">
        <a href="{{ url_for('messages.inbox') }}"
           class="text-gray-400 hover:text-gray-600 transition text-xl">←</a>
        <h2 class="text-2xl font-bold text-gray-800">✉️ 새 메시지</h2>
    </div>

    <div class="bg-white rounded-xl shadow p-6">
        <form method="POST" action="{{ url_for('messages.new_conversation') }}" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <!-- 받는 사람 -->
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-700 mb-2">받는 사람</label>
                <select name="other_user_id" required
                        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="">-- 선택 --</option>
                    {% if current_user.role == 'admin' %}
                    <optgroup label="── 전체 발송 ──">
                        <option value="_all_teachers">📢 전체 강사에게</option>
                        <option value="_all_admins">📢 전체 관리자에게</option>
                        <option value="_all">📢 전체 (강사 + 관리자)</option>
                    </optgroup>
                    <optgroup label="── 개별 발송 ──">
                    {% endif %}
                    {% for peer in peers %}
                    <option value="{{ peer.user_id }}">
                        {{ peer.name }} ({{ '관리자' if peer.role == 'admin' else '강사' }})
                    </option>
                    {% endfor %}
                    {% if current_user.role == 'admin' %}
                    </optgroup>
                    {% endif %}
                </select>
            </div>

            <!-- 메시지 내용 -->
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-700 mb-2">내용</label>
                <textarea name="body" rows="6" required
                          placeholder="메시지를 입력하세요..."
                          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
            </div>

            <!-- 첨부파일 -->
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-700 mb-2">첨부파일 <span class="text-gray-400 font-normal">(선택)</span></label>
                <input type="file" name="attachment"
                       accept=".jpg,.jpeg,.png,.gif,.pdf,.doc,.docx,.hwp,.zip,.mp4,.mp3"
                       class="w-full text-sm text-gray-600 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:bg-blue-50 file:text-blue-700 file:font-medium hover:file:bg-blue-100 cursor-pointer">
                <p class="text-xs text-gray-400 mt-1">이미지, PDF, 문서 등 (최대 20MB)</p>
            </div>

            <div class="flex justify-end gap-3">
                <a href="{{ url_for('messages.inbox') }}"
                   class="px-5 py-2 border border-gray-300 text-gray-600 rounded-lg hover:bg-gray-50 transition text-sm">
                    취소
                </a>
                <button type="submit"
                        class="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm font-medium">
                    보내기
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
